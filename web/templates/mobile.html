<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>IRIS – Driver View</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    :root{--bg:#0a0e1a;--card:#111827;--border:#1e293b;--text:#f1f5f9;
          --sub:#64748b;--red:#ef4444;--orange:#f97316;--green:#22c55e;--accent:#3b82f6;}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);
         min-height:100vh;max-width:480px;margin:0 auto;}

    /* Header */
    header{background:var(--card);border-bottom:1px solid var(--border);
           padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
           position:sticky;top:0;z-index:10;}
    .logo{font-size:1rem;font-weight:700;color:var(--accent);}
    .conn{display:flex;align-items:center;gap:5px;font-size:0.75rem;color:var(--sub);}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--red);}
    .dot.live{background:var(--green);}

    /* Session control */
    .session-panel{padding:14px 16px;background:var(--card);
                   border-bottom:1px solid var(--border);}
    .session-status{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .session-info{font-size:0.78rem;color:var(--sub);}
    .session-id{font-size:0.78rem;color:var(--accent);font-family:monospace;}
    .timer{font-size:1.4rem;font-weight:700;font-family:monospace;color:var(--accent);}
    .btns{display:flex;gap:8px;}
    .btn{flex:1;padding:10px;border:none;border-radius:8px;font-weight:700;
         font-size:0.88rem;cursor:pointer;}
    .btn-start{background:var(--green);color:#fff;}
    .btn-end{background:var(--red);color:#fff;display:none;}
    .btn:active{transform:scale(0.97);}

    /* High alert banner */
    .high-alert{display:none;margin:12px 16px;background:#ef444422;border:1px solid var(--red);
                border-radius:10px;padding:12px 14px;border-left:4px solid var(--red);}
    .high-alert.show{display:block;}
    .high-alert-title{font-size:0.9rem;font-weight:700;color:var(--red);margin-bottom:3px;}
    .high-alert-sub{font-size:0.78rem;color:#fca5a5;}

    /* Stats bar */
    .stats{display:flex;gap:0;border-bottom:1px solid var(--border);}
    .stat{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border);}
    .stat:last-child{border-right:none;}
    .stat .val{font-size:1.4rem;font-weight:700;}
    .stat .lbl{font-size:0.65rem;color:var(--sub);text-transform:uppercase;margin-top:1px;}
    .val.blue{color:var(--accent);} .val.red{color:var(--red);}
    .val.orange{color:var(--orange);} .val.green{color:var(--green);}

    /* Detection feed */
    .feed-title{padding:12px 16px 8px;font-size:0.72rem;text-transform:uppercase;
                letter-spacing:1px;color:var(--sub);}
    .feed{display:flex;flex-direction:column;gap:8px;padding:0 12px 80px;}
    .det-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
              padding:12px;display:flex;gap:10px;align-items:center;}
    .det-card.High{border-left:4px solid var(--red);}
    .det-card.Medium{border-left:4px solid var(--orange);}
    .det-card.Low{border-left:4px solid var(--green);}
    .sev-icon{font-size:1.4rem;flex-shrink:0;}
    .det-info{flex:1;min-width:0;}
    .det-sev{font-size:0.82rem;font-weight:700;}
    .det-sev.High{color:var(--red);} .det-sev.Medium{color:var(--orange);} .det-sev.Low{color:var(--green);}
    .det-conf{font-size:0.75rem;color:var(--sub);}
    .det-ts{font-size:0.7rem;color:var(--sub);}
    .det-loc{font-size:0.68rem;color:var(--accent);font-family:monospace;
             overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:0.85rem;}
    .empty .ico{font-size:2.5rem;opacity:0.3;margin-bottom:8px;}

    /* Bottom nav */
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
                width:100%;max-width:480px;background:var(--card);
                border-top:1px solid var(--border);display:flex;}
    .nav-item{flex:1;padding:12px 8px;text-align:center;cursor:pointer;
              font-size:0.7rem;color:var(--sub);}
    .nav-item.active{color:var(--accent);}
    .nav-item .nav-ico{font-size:1.2rem;margin-bottom:2px;}
  </style>
</head>
<body>

<header>
  <div class="logo">🚧 IRIS Driver</div>
  <div class="conn"><div class="dot" id="dot"></div><span id="conn-lbl">Connecting…</span></div>
</header>

<div class="session-panel">
  <div class="session-status">
    <div>
      <div class="session-id" id="sess-id">No active session</div>
      <div class="session-info" id="sess-route">Start inspection to begin</div>
    </div>
    <div class="timer" id="timer" style="display:none">00:00</div>
  </div>
  <div class="btns">
    <button class="btn btn-start" id="btn-start" onclick="startSession()">▶ Start Inspection</button>
    <button class="btn btn-end"   id="btn-end"   onclick="endSession()">⏹ End & Upload</button>
  </div>
</div>

<!-- High alert -->
<div class="high-alert" id="high-alert">
  <div class="high-alert-title">⚠ HIGH SEVERITY POTHOLE!</div>
  <div class="high-alert-sub" id="high-alert-sub">Detected ahead — logged with GPS</div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat"><div class="val blue" id="m-total">0</div><div class="lbl">Total</div></div>
  <div class="stat"><div class="val red"    id="m-high">0</div><div class="lbl">High</div></div>
  <div class="stat"><div class="val orange" id="m-med">0</div><div class="lbl">Medium</div></div>
  <div class="stat"><div class="val green"  id="m-low">0</div><div class="lbl">Low</div></div>
</div>

<div class="feed-title">Recent Detections</div>
<div class="feed" id="feed">
  <div class="empty">
    <div class="ico">🛣️</div>
    Start a session to begin detecting potholes
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active"><div class="nav-ico">📊</div>Dashboard</div>
  <div class="nav-item" onclick="location.href='/municipal'"><div class="nav-ico">🏛️</div>Municipal</div>
  <div class="nav-item" onclick="location.href='/'"><div class="nav-ico">🖥️</div>Full View</div>
</div>

<script>
const socket=io();
let total=0,high=0,med=0,low=0,active=false,elapsed=0,timerInt=null;
const SEV_ICON={'High':'🔴','Medium':'🟠','Low':'🟡'};

socket.on('connect',()=>{
  document.getElementById('dot').className='dot live';
  document.getElementById('conn-lbl').textContent='Connected';
});
socket.on('disconnect',()=>{
  document.getElementById('dot').className='dot';
  document.getElementById('conn-lbl').textContent='Offline';
});

function fmtTime(s){
  const m=Math.floor(s/60),sec=s%60;
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function setSessionActive(sessionId, routeLabel, elapsedSec){
  active=true;
  elapsed=elapsedSec||0;
  clearInterval(timerInt);
  document.getElementById('sess-id').textContent='Session: '+sessionId;
  document.getElementById('sess-route').textContent=routeLabel;
  document.getElementById('timer').style.display='block';
  document.getElementById('timer').textContent=fmtTime(elapsed);
  document.getElementById('btn-start').style.display='none';
  document.getElementById('btn-end').style.display='block';
  timerInt=setInterval(()=>{
    elapsed++;
    document.getElementById('timer').textContent=fmtTime(elapsed);
  },1000);
}

function setSessionInactive(title, subtitle){
  active=false;
  clearInterval(timerInt);
  timerInt=null;
  elapsed=0;
  document.getElementById('sess-id').textContent=title;
  document.getElementById('sess-route').textContent=subtitle;
  document.getElementById('timer').style.display='none';
  document.getElementById('btn-start').style.display='block';
  document.getElementById('btn-end').style.display='none';
}

function resetFeed(message){
  total=high=med=low=0;
  updateStats();
  document.getElementById('feed').innerHTML=`<div class="empty"><div class="ico">🛣️</div>${message}</div>`;
}

function renderDetection(data){
  total++; const sev=data.severity;
  if(sev==='High'){high++;showHighAlert(data);}
  else if(sev==='Medium') med++;
  else low++;
  updateStats();

  const feed=document.getElementById('feed');
  if(feed.querySelector('.empty')) feed.innerHTML='';
  const card=document.createElement('div');
  card.className=`det-card ${sev}`;
  card.innerHTML=`
    <div class="sev-icon">${SEV_ICON[sev]||'⚪'}</div>
    <div class="det-info">
      <div class="det-sev ${sev}">${sev} Severity</div>
      <div class="det-conf">${(data.confidence*100).toFixed(1)}% confidence · Area: ${data.area||'—'}px²</div>
      <div class="det-ts">${data.timestamp}</div>
      ${data.location?`<div class="det-loc">📍 ${data.location}</div>`:''}
    </div>`;
  feed.insertBefore(card,feed.firstChild);
  if(feed.children.length>30) feed.removeChild(feed.lastChild);
}

async function restoreCurrentSession(){
  const status=await fetch('/api/session/status').then(r=>r.json());
  if(!status.active){
    setSessionInactive('No active session', 'Start inspection to begin');
    resetFeed('Start a session to begin detecting potholes');
    return;
  }

  setSessionActive(status.session_id, (status.route||'Field Inspection')+' — Active', status.elapsed||0);
  resetFeed('Restoring live session…');
  const detections=await fetch('/api/session/'+encodeURIComponent(status.session_id)+'/detections').then(r=>r.json());
  if(!detections.length){
    document.getElementById('feed').innerHTML='<div class="empty"><div class="ico">📡</div>Listening for potholes…</div>';
    return;
  }
  detections.forEach(d=>renderDetection({
    severity:d.severity,
    confidence:d.confidence,
    area:'—',
    timestamp:d.timestamp,
    location:d.location,
  }));
}

async function startSession(){
  const r=await fetch('/api/session/start',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({vehicle_id:'MOBILE-01',route:'Field Inspection'})});
  const d=await r.json();
  if(d.session_id) await restoreCurrentSession();
}

async function endSession(){
  if(!confirm('End session and upload to municipal?')) return;
  await fetch('/api/session/end',{method:'POST'});
  setSessionInactive('Session uploaded ✓','Data sent to Municipal Dashboard');
}

function updateStats(){
  document.getElementById('m-total').textContent=total;
  document.getElementById('m-high').textContent=high;
  document.getElementById('m-med').textContent=med;
  document.getElementById('m-low').textContent=low;
}

socket.on('detection',function(data){
  if(!active) return;
  renderDetection(data);
});

function showHighAlert(data){
  const a=document.getElementById('high-alert');
  document.getElementById('high-alert-sub').textContent=
    `Confidence: ${(data.confidence*100).toFixed(1)}%`
    +(data.location?` · 📍 ${data.location}`:'');
  a.classList.add('show');
  // Vibrate if supported
  if(navigator.vibrate) navigator.vibrate([200,100,200]);
  setTimeout(()=>a.classList.remove('show'),6000);
}

socket.on('session_started', function(status){
  if(status && status.active) restoreCurrentSession();
});

socket.on('session_ended', function(){
  setSessionInactive('Session uploaded ✓','Data sent to Municipal Dashboard');
});

restoreCurrentSession();
</script>
</body>
</html>
